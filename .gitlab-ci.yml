pages:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - mkdir -p public

    - |
      RAW="$CI_COMMIT_TITLE"
      SHORT=$(printf "%.18s" "$RAW")

      if [ "${#RAW}" -gt 18 ]; then
        TITLE="${SHORT}.."
      else
        TITLE="$RAW"
      fi

      cat > public/commit-badge.json <<EOF
      {
        "schemaVersion": 1,
        "label": "Nightly Build",
        "message": "$TITLE",
        "color": "9b59b6"
      }
      EOF

  artifacts:
    paths:
      - public
