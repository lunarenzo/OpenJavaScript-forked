badge:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - mkdir -p public
    - |
      RAW="$CI_COMMIT_TITLE"
      SHORT=$(printf "%.7s" "$RAW")

      if [ "${#RAW}" -gt 7 ]; then
        TITLE="${SHORT}.."
      else
        TITLE="$RAW"
      fi

      cat > public/commit-badge.json <<EOF
      {
        "schemaVersion": 1,
        "label": "Nightly",
        "message": "$TITLE",
        "color": "9b59b6"
      }
      EOF
  artifacts:
    paths:
      - public/commit-badge.json
    public: true
